<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Birthday Balloon 28</title>
  <desc id="desc">Celebration balloons with a highlighted number 28.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b103d"/>
      <stop offset="45%" stop-color="#421454"/>
      <stop offset="100%" stop-color="#180726"/>
    </linearGradient>
    <radialGradient id="shinePink" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ffd9f4"/>
      <stop offset="46%" stop-color="#ff72cf"/>
      <stop offset="100%" stop-color="#cf2f9c"/>
    </radialGradient>
    <radialGradient id="shineBlue" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#dff8ff"/>
      <stop offset="48%" stop-color="#59d4ff"/>
      <stop offset="100%" stop-color="#1f88d6"/>
    </radialGradient>
    <radialGradient id="shineGold" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#fff7dc"/>
      <stop offset="48%" stop-color="#ffc85a"/>
      <stop offset="100%" stop-color="#e78d1f"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="980" fill="url(#bg)"/>
  <circle cx="350" cy="210" r="210" fill="#ff56cd" opacity="0.15"/>
  <circle cx="1070" cy="150" r="190" fill="#4dc8ff" opacity="0.14"/>
  <circle cx="700" cy="860" r="280" fill="#ff85db" opacity="0.12"/>

  <g stroke-linecap="round">
    <path d="M315 338 C 338 490, 290 598, 328 740" stroke="#f3acd8" stroke-width="7" opacity="0.8"/>
    <path d="M1115 358 C 1096 498, 1144 618, 1105 750" stroke="#abdfff" stroke-width="7" opacity="0.8"/>
    <path d="M690 448 C 664 590, 730 702, 688 828" stroke="#ffd59f" stroke-width="8" opacity="0.9"/>
  </g>

  <g filter="url(#softGlow)">
    <ellipse cx="315" cy="260" rx="140" ry="160" fill="url(#shinePink)"/>
    <ellipse cx="1115" cy="282" rx="140" ry="160" fill="url(#shineBlue)"/>
    <ellipse cx="700" cy="360" rx="195" ry="230" fill="url(#shineGold)"/>
  </g>

  <ellipse cx="266" cy="192" rx="44" ry="28" fill="#ffffff" opacity="0.36"/>
  <ellipse cx="1068" cy="214" rx="46" ry="30" fill="#ffffff" opacity="0.34"/>
  <ellipse cx="635" cy="250" rx="66" ry="42" fill="#ffffff" opacity="0.35"/>

  <polygon points="298,424 334,424 316,462" fill="#cf2f9c"/>
  <polygon points="1098,450 1132,450 1115,486" fill="#1f88d6"/>
  <polygon points="678,566 722,566 700,612" fill="#cf7b18"/>

  <text x="700" y="420" text-anchor="middle" font-family="Orbitron, Arial, sans-serif" font-size="182" font-weight="800" fill="#fff7d1" letter-spacing="4">28</text>
  <text x="700" y="503" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="44" font-weight="600" fill="#fff8ec" opacity="0.96">Birthday Celebration</text>
</svg>
