<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rule-Based AI Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-card" aria-label="Rule-based chatbot">
        <header class="chat-header">
          <h1>Eva Ai Chat Box</h1>
        </header>

        <svg class="leaf-watermark" viewBox="0 0 120 130" aria-hidden="true">
          <defs>
            <linearGradient id="leafFill" x1="16%" y1="10%" x2="86%" y2="90%">
              <stop offset="0%" stop-color="#9bd6a4" />
              <stop offset="100%" stop-color="#4f9867" />
            </linearGradient>
          </defs>
          <path
            class="leaf-body"
            d="M60 12C79 18 93 36 97 57C101 79 90 98 72 109C67 112 63 114 60 116C57 114 53 112 48 109C30 98 19 79 23 57C27 36 41 18 60 12Z"
            fill="url(#leafFill)"
          />
          <path class="leaf-main-vein" d="M60 20C59 42 58 72 60 110" />
          <path class="leaf-side-vein" d="M58 45C49 42 43 37 37 31" />
          <path class="leaf-side-vein" d="M58 60C47 58 39 53 32 47" />
          <path class="leaf-side-vein" d="M58 76C46 76 37 72 30 67" />
          <path class="leaf-side-vein" d="M62 45C71 42 77 37 83 31" />
          <path class="leaf-side-vein" d="M62 60C73 58 81 53 88 47" />
          <path class="leaf-side-vein" d="M62 76C74 76 83 72 90 67" />
          <path class="leaf-stem" d="M60 114C60 120 58 123 54 126" />
        </svg>

        <div class="chat-window" id="chatWindow" aria-live="polite"></div>

        <form class="chat-form" id="chatForm" autocomplete="off">
          <label for="userInput" class="visually-hidden">Type your message</label>
          <input
            type="text"
            id="userInput"
            placeholder="Type a message"
            maxlength="120"
            required
          />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
